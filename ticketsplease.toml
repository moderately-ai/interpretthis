schema_version = 1
tickets_dir = "tickets"
default_base = "main"

[language]
# Cargo workspace: the `interpretthis` core plus its language-binding crates.
# File-glob scopes drive parallel dispatch; reverse-dep expansion would collapse
# every core scope into one crate-level collision (and drag the bindings in with
# it, since they depend on the core), so it stays off.
backend = "rust"
reverse_dep_expansion = false

# Scopes partition the tree so `tracks` / `guard` can keep parallel work
# conflict-free. Prefer the narrowest scope that covers the change; claim
# multiple when a ticket truly spans subsystems.
[scopes]
# Public surface + orchestration
"core" = [
    "crates/interpretthis/src/lib.rs",
    "crates/interpretthis/src/config.rs",
    "crates/interpretthis/src/error.rs",
    "crates/interpretthis/src/interpreter.rs",
    "crates/interpretthis/src/parser.rs",
    "crates/interpretthis/src/state.rs",
    "crates/interpretthis/src/serialize.rs",
    "crates/interpretthis/src/value.rs",
    "crates/interpretthis/src/types.rs",
]

# Expression / statement evaluation spine (not modules or function dispatch)
"eval" = [
    "crates/interpretthis/src/eval/mod.rs",
    "crates/interpretthis/src/eval/classes.rs",
    "crates/interpretthis/src/eval/comprehensions.rs",
    "crates/interpretthis/src/eval/control_flow.rs",
    "crates/interpretthis/src/eval/delete.rs",
    "crates/interpretthis/src/eval/exceptions.rs",
    "crates/interpretthis/src/eval/literals.rs",
    "crates/interpretthis/src/eval/match_stmt.rs",
    "crates/interpretthis/src/eval/names.rs",
    "crates/interpretthis/src/eval/op.rs",
    "crates/interpretthis/src/eval/operations.rs",
    "crates/interpretthis/src/eval/place.rs",
    "crates/interpretthis/src/eval/render.rs",
    "crates/interpretthis/src/eval/statements.rs",
    "crates/interpretthis/src/eval/strings.rs",
]

# Call / method / builtin dispatch
"eval/functions" = ["crates/interpretthis/src/eval/functions/**"]

# Stdlib module registry + implementations
"eval/modules" = ["crates/interpretthis/src/eval/modules/**"]

# Sandbox blocklists + AST validation
"security" = ["crates/interpretthis/src/security/**"]

# Host tool injection / lazy proxies
"tools" = ["crates/interpretthis/src/tools/**"]

# Integration suite + parity corpus
"tests" = ["crates/interpretthis/tests/**", "crates/interpretthis/build.rs"]

# Criterion benches + baseline
"benches" = ["crates/interpretthis/benches/**"]

# Python (pyo3 / maturin) binding: Rust boundary + the thin Python wrapper package
"bindings/python" = ["crates/interpretthis-python/**"]

# Node (napi-rs) binding: Rust boundary + the npm package
"bindings/node" = ["crates/interpretthis-node/**"]

# User-facing docs
"docs" = [
    "README.md",
    "CONFORMANCE.md",
    "STATUS.md",
    "THREAT_MODEL.md",
    "MODULE_TEMPLATE.md",
    "CHANGELOG.md",
    "CONTRIBUTING.md",
    "RELEASING.md",
    "LICENSE-MIT",
    "LICENSE-APACHE",
]

# Build / CI / packaging metadata
"meta" = [
    "Cargo.toml",
    "Cargo.lock",
    "crates/interpretthis/Cargo.toml",
    "deny.toml",
    "NOTICE",
    "rustfmt.toml",
    ".gitignore",
    ".github/**",
    "license-header.txt",
    "scripts/**",
    "ticketsplease.toml",
    "tickets/**",
    ".ticketsplease/**",
]

# Maps each scope to its owning crate for language-backend awareness. Reverse-dep
# expansion is disabled, so multi-scope tickets don't all collide via the graph.
[scope_crates]
"core" = "interpretthis"
"eval" = "interpretthis"
"eval/functions" = "interpretthis"
"eval/modules" = "interpretthis"
"security" = "interpretthis"
"tools" = "interpretthis"
"bindings/python" = "interpretthis-python"
"bindings/node" = "interpretthis-node"

[external_scopes]
