# https://pre-commit.com
# Install: pipx install pre-commit && pre-commit install --hook-type pre-commit --hook-type commit-msg

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # Conventional Commits on every commit message
  # https://www.conventionalcommits.org/
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          # Allowed types (Angular / Conventional Commits + common extras)
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)^(
            crates/interpretthis/tests/integration/parity_corpus/.*|
            crates/interpretthis/tests/integration/cpython_vendored/.*
          )$
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
            crates/interpretthis/tests/integration/parity_corpus/.*|
            crates/interpretthis/tests/integration/cpython_vendored/.*
          )$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # Rust formatting — same as CI
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types: [rust]
