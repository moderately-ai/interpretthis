# cargo-deny for interpretthis.
# Local: cargo deny check
# CI: job `deny` in .github/workflows/ci.yml

[graph]
all-features = false

[advisories]
version = 2
# Transitive via rustpython-parser / its stack — no safe upgrade until parser moves.
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained; transitive build dep" },
    { id = "RUSTSEC-2025-0081", reason = "unic-* via rustpython-parser 0.4; no safe upgrade" },
    { id = "RUSTSEC-2025-0075", reason = "unic-* via rustpython-parser 0.4; no safe upgrade" },
    { id = "RUSTSEC-2025-0080", reason = "unic-* via rustpython-parser 0.4; no safe upgrade" },
    { id = "RUSTSEC-2025-0090", reason = "unic-* via rustpython-parser 0.4; no safe upgrade" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident via rustpython-parser 0.4" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version via rustpython-parser 0.4" },
]

[licenses]
version = 2
confidence-threshold = 0.8
# A dependency whose license falls outside this set fails the gate, forcing a
# deliberate review. The OSI-permissive set is kept broad because the binding
# crates (pyo3, napi) pull a wider graph than the core interpreter does.
unused-allowed-license = "allow"
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    # File-level weak copyleft; standard to allow for an unmodified dependency.
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    # malachite (via rustpython-parser / malachite-bigint) is LGPL-3.0-only, and
    # is statically linked into every binary we build. Harmless while crates.io
    # ships source; it carries LGPL-3.0 §4 obligations onto any *binary* we
    # distribute (PyPI wheels, npm .node addons) — see NOTICE. The tracked exit
    # is migrating to `ruff_python_parser` (MIT).
    "LGPL-3.0-only",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
